[pytest]
# Pytest configuration for CRISPR-UniPredict

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options
testpaths = tests
norecursedirs = .git .venv venv build dist *.egg

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    gpu: Tests requiring GPU
    edge_case: Edge case tests

# Timeout (seconds)
timeout = 300

# Minimum Python version
minversion = 3.9
