name: crispr_unipredict
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.9
  
  # PyTorch with CUDA 11.8
  - pytorch::pytorch::2.0.0
  - pytorch::pytorch-cuda=11.8
  - pytorch::torchvision
  - pytorch::torchaudio
  
  # Core scientific packages
  - numpy
  - pandas
  - scipy
  - scikit-learn
  
  # Visualization
  - matplotlib
  - seaborn
  - plotly
  
  # Deep learning and transformers
  - pip
  - pip:
    - transformers>=4.30.0
    - fair-esm>=2.0.0
    - pytorch-lightning>=2.0.0
    - wandb>=0.15.0
    - tensorboard>=2.13.0
    - hydra-core>=1.3.0
    - biopython>=1.81
    - pyyaml>=6.0
    - tqdm>=4.65.0
    - jupyter>=1.0.0
    - jupyterlab>=3.6.0
    - ipython>=8.12.0
    - pytest>=7.3.0
    - black>=23.3.0
    - flake8>=6.0.0

# Environment variables (optional, can be set separately)
# CUDA_HOME: /path/to/cuda/11.8
# PYTORCH_CUDA_ALLOC_CONF: max_split_size_mb:512
