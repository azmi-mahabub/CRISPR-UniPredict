model:
  name: CRISPR-UniPredict
  version: 1.0
  description: Unified Hybrid Neural Network for CRISPR Prediction
  
  encoding:
    max_sequence_length: 23
    embedding_dim: 128
    vocab_size: 6
    use_one_hot: true
    use_label_encoding: true
    use_rna_fm: true
  
  msc:
    in_channels: 4
    out_channels: 64
    kernel_sizes: [1, 3, 5, 7]
    dropout: 0.35
  
  bigru:
    hidden_dim: 128
    num_layers: 1
    dropout: 0.35
    bidirectional: true
  
  mhsa:
    embed_dim: 256
    num_heads: 4
    dropout: 0.35
  
  rna_fm:
    model_path: models/pretrained/rna_fm_t12.pt
    freeze_layers: true
    fine_tune_last_n: 2
    embedding_dim: 640
  
  fusion:
    hidden_dim: 256
    fusion_method: attention  # or 'concat'
    num_branches: 3
    dropout: 0.35
  
  task_heads:
    shared_dim: 256
    on_target_hidden: [80, 20]
    off_target_hidden: [80, 20]
    dropout: 0.35

training:
  batch_size: 32
  epochs: 100
  learning_rate_encoder: 1.0e-3  # INCREASED from 5e-4 to escape local minimum
  learning_rate_heads: 2.0e-3    # INCREASED from 1e-3 for better learning
  learning_rate_on_target_head: 1.0e-2  # NEW: 5x higher for on-target head
  optimizer: AdamW
  warmup_epochs: 5
  weight_decay: 0.01
  gradient_clip: 1.0
  
  loss:
    on_target_loss: huber  # CHANGED from mae to huber for better outlier handling
    off_target_loss: focal  # CHANGED from bce to focal loss for imbalance
    loss_weights:
      on_target: 5.0  # INCREASED from 1.0 to 5.0 (5x more important)
      off_target: 0.5  # DECREASED from 2.0 to 0.5 (focus on on-target)
    use_class_weights: true  # use weighted loss for class imbalance
    huber_delta: 0.5  # Huber loss delta parameter
  
  scheduler:
    type: reduce_on_plateau  # or 'cosine', 'linear', 'exponential'
    patience: 5  # INCREASED from 3 to give more time to improve
    factor: 0.5
    min_lr: 1.0e-6
    warmup_type: linear  # or 'constant'
  
  two_phase_training: true  # NEW: Enable two-phase training
  phase1_epochs: 30  # Phase 1: joint training
  phase2_epochs: 30  # Phase 2: on-target focused
  phase2_on_target_weight: 10.0  # Phase 2: even higher weight for on-target

validation:
  val_frequency: 1  # epochs
  early_stopping_patience: 15  # INCREASED from 10 to allow more training
  early_stopping_metric: val_loss  # or 'val_on_target_rmse', 'val_off_target_auc'
  early_stopping_mode: min  # or 'max'

data:
  train_path: data/processed/combined/train.csv
  val_path: data/processed/combined/val.csv
  test_path: data/processed/combined/test.csv
  num_workers: 0
  pin_memory: false
  prefetch_factor: 1
  
  sampling:
    strategy: stratified  # CHANGED from balanced to stratified for guaranteed both classes
    on_target_ratio: 0.5
    off_target_ratio: 0.5
  
  augmentation:
    use_augmentation: true  # NEW: Enable augmentation
    augmentation_types: ['reverse_complement', 'noise']  # NEW: Augment on-target samples
    augmentation_probability: 0.5  # Apply to 50% of on-target samples
  use_cache: false

device:
  use_cuda: true
  gpu_ids: [0]
  mixed_precision: false
  benchmark: true  # cudnn auto-tuner

logging:
  log_dir: logs
  checkpoint_dir: models/checkpoints
  use_wandb: false
  wandb_project: CRISPR-UniPredict
  wandb_entity: null  # your wandb entity/team
  save_frequency: 1  # epochs
  print_frequency: 100  # batches
  log_level: WARNING  # DEBUG, INFO, WARNING, ERROR
  
  metrics_to_log:
    - loss
    - on_target_loss
    - off_target_loss
    - on_target_rmse
    - on_target_r2
    - off_target_auc
    - off_target_accuracy
    - learning_rate

inference:
  batch_size: 64
  return_attention_weights: false
  return_branch_outputs: false
  device: cuda  # or 'cpu'

# Model selection and ensemble
model_selection:
  strategy: best_val_loss  # 'best_val_loss', 'best_on_target', 'best_off_target'
  save_top_k: 3
  
ensemble:
  use_ensemble: false
  num_models: 5
  ensemble_method: average  # 'average', 'voting', 'stacking'
