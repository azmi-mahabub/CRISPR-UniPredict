# Minimal run: RNA-FM hub weights + real branch-C forward (see models/crispr_unipredict.py)
model:
  name: CRISPR-UniPredict
  version: 1.0
  encoding:
    max_sequence_length: 23
    embedding_dim: 128
    vocab_size: 6
    use_one_hot: true
    use_label_encoding: true
    use_rna_fm: true
  msc:
    in_channels: 4
    out_channels: 64
    kernel_sizes: [1, 3, 5, 7]
    dropout: 0.35
  bigru:
    hidden_dim: 128
    num_layers: 1
    dropout: 0.35
    bidirectional: true
  mhsa:
    embed_dim: 256
    num_heads: 4
    dropout: 0.35
  rna_fm:
    model_path: models/pretrained/rna_fm_t12.pt
    freeze_layers: true
    fine_tune_last_n: 2
    embedding_dim: 640
  fusion:
    hidden_dim: 256
    fusion_method: attention
    num_branches: 3
    dropout: 0.35
  task_heads:
    shared_dim: 256
    on_target_hidden: [80, 20]
    off_target_hidden: [80, 20]
    dropout: 0.35

training:
  batch_size: 8
  epochs: 2
  learning_rate_encoder: 5.0e-4
  learning_rate_heads: 1.0e-3
  optimizer: AdamW
  warmup_epochs: 0
  weight_decay: 0.01
  gradient_clip: 1.0
  loss:
    on_target_loss: mse
    off_target_loss: bce
    loss_weights:
      on_target: 1.0
      off_target: 0.5
  scheduler:
    type: reduce_on_plateau
    patience: 2
    factor: 0.5
    min_lr: 1.0e-6
    warmup_type: linear

validation:
  val_frequency: 1
  early_stopping_patience: 10
  early_stopping_metric: val_loss
  early_stopping_mode: min

data:
  train_path: data/processed/combined/train.csv
  val_path: data/processed/combined/val.csv
  test_path: data/processed/combined/test.csv
  num_workers: 0
  pin_memory: false
  prefetch_factor: 2
  sampling:
    strategy: balanced
    on_target_ratio: 0.5
    off_target_ratio: 0.5
  augmentation:
    use_augmentation: false
    augmentation_types: []

device:
  use_cuda: false
  gpu_ids: [0]
  mixed_precision: false
  benchmark: false

logging:
  log_dir: logs
  checkpoint_dir: models/checkpoints
  use_wandb: false
  save_frequency: 1
  print_frequency: 2
  log_level: INFO

inference:
  batch_size: 8
  device: cpu

model_selection:
  strategy: best_val_loss
  save_top_k: 1

ensemble:
  use_ensemble: false
  num_models: 1
  ensemble_method: average
